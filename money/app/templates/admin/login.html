<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Auto-Posting Money Pages</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100">
    <form action="/auth/login" method="post" class="bg-white border border-slate-200 rounded-2xl p-8 shadow-xl w-full max-w-md space-y-4">
        <h1 class="text-2xl font-semibold text-center">Admin Login</h1>
        {% if error %}<p class="text-sm text-red-600 text-center">{{ error }}</p>{% endif %}
        <label class="block text-sm font-medium text-slate-600">Email
            <input type="email" name="email" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2" required>
        </label>
        <label class="block text-sm font-medium text-slate-600">Password
            <input type="password" name="password" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2" required>
        </label>
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Sign in</button>
    </form>
</body>
</html>
