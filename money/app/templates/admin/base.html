<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Auto-Posting Money Pages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-slate-100">
<div class="min-h-screen flex">
    <aside class="w-64 bg-slate-900 text-white hidden md:block">
        <div class="p-6 text-xl font-semibold">Admin</div>
        <nav class="px-4 space-y-1 text-sm">
            <a href="/admin" class="block px-3 py-2 rounded hover:bg-white/10">Dashboard</a>
            <a href="/admin/keywords" class="block px-3 py-2 rounded hover:bg-white/10">Keywords</a>
            <a href="/admin/pages" class="block px-3 py-2 rounded hover:bg-white/10">Pages</a>
            <a href="/admin/settings" class="block px-3 py-2 rounded hover:bg-white/10">Settings</a>
        </nav>
        <form action="/auth/logout" method="post" class="px-4 mt-10">
            <button class="w-full text-left px-3 py-2 rounded bg-white/10 hover:bg-white/20 text-sm">Log out</button>
        </form>
    </aside>
    <main class="flex-1">
        <header class="bg-white shadow-sm border-b border-slate-100 p-4 flex justify-between items-center">
            <p class="text-sm text-slate-500">Hello {{ user.email if user else '' }}</p>
            <a href="/" class="text-sm text-blue-600">View site -&gt;</a>
        </header>
        <div class="p-6">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<script src="/static/js/admin.js"></script>
</body>
</html>
