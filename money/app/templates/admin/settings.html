{% extends 'admin/base.html' %}
{% block content %}
<h1 class="text-2xl font-semibold">Settings</h1>
<form action="/admin/settings" method="post" class="grid md:grid-cols-2 gap-6 mt-6">
    <div class="bg-white border border-slate-200 rounded-xl p-5 space-y-4">
        <h2 class="text-lg font-semibold">Ad placements</h2>
        <label class="block text-sm">Top ad
            <textarea name="ads_top" class="mt-1 w-full border border-slate-200 rounded-lg p-3">{{ ads_top }}</textarea>
        </label>
        <label class="block text-sm">Middle ad
            <textarea name="ads_mid" class="mt-1 w-full border border-slate-200 rounded-lg p-3">{{ ads_mid }}</textarea>
        </label>
        <label class="block text-sm">Bottom ad
            <textarea name="ads_bottom" class="mt-1 w-full border border-slate-200 rounded-lg p-3">{{ ads_bottom }}</textarea>
        </label>
    </div>
    <div class="bg-white border border-slate-200 rounded-xl p-5 space-y-4">
        <h2 class="text-lg font-semibold">Automation</h2>
        <label class="block text-sm">Daily generation quota
            <input type="number" name="daily_generation_quota" value="{{ daily_generation_quota }}" class="mt-1 w-full border border-slate-200 rounded-lg p-2">
        </label>
        <label class="block text-sm">Daily publish quota
            <input type="number" name="daily_publish_quota" value="{{ daily_publish_quota }}" class="mt-1 w-full border border-slate-200 rounded-lg p-2">
        </label>
        <label class="block text-sm">Affiliate block
            <textarea name="affiliate" class="mt-1 w-full border border-slate-200 rounded-lg p-3">{{ affiliate }}</textarea>
        </label>
        <label class="block text-sm">Analytics snippet
            <textarea name="analytics" class="mt-1 w-full border border-slate-200 rounded-lg p-3">{{ analytics }}</textarea>
        </label>
        <button class="w-full bg-blue-600 text-white rounded-lg py-2">Save settings</button>
    </div>
</form>
{% endblock %}
