{% extends 'admin/base.html' %}
{% block content %}
<div class="flex items-center justify-between gap-4">
    <h1 class="text-2xl font-semibold">Keyword ideas</h1>
    <form action="/admin/keywords/import" method="post" class="flex items-center gap-2">
        <textarea name="csv_text" placeholder="Paste CSV rows" rows="3" class="border border-slate-200 rounded-lg px-3 py-2 text-xs min-w-[220px]"></textarea>
        <button class="px-4 py-2 text-sm bg-slate-900 text-white rounded-lg">Bulk import</button>
    </form>
</div>
<div class="bg-white border border-slate-200 rounded-xl p-5 mt-6">
    <form action="/admin/keywords" method="post" class="grid md:grid-cols-4 gap-4">
        <input name="phrase" placeholder="Keyword phrase" class="border border-slate-200 rounded-lg px-3 py-2 col-span-2" required>
        <input name="priority_score" placeholder="Priority" class="border border-slate-200 rounded-lg px-3 py-2" type="number">
        <select name="target_page_type" class="border border-slate-200 rounded-lg px-3 py-2">
            <option value="explanation">Explanation</option>
            <option value="example">Example</option>
            <option value="how_to">How-to</option>
            <option value="comparison">Comparison</option>
            <option value="job_example">Job/CV</option>
            <option value="social_bio">Social bio</option>
        </select>
        <button class="bg-blue-600 text-white rounded-lg px-4 py-2">Add keyword</button>
    </form>
</div>
<div class="bg-white border border-slate-200 rounded-xl mt-8">
    <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
            <tr>
                <th class="text-left px-4 py-3">Keyword</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-left px-4 py-3">Priority</th>
                <th class="text-left px-4 py-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for keyword in keywords %}
            <tr class="border-t border-slate-100">
                <td class="px-4 py-3">{{ keyword.phrase }}</td>
                <td class="px-4 py-3">{{ keyword.status.value }}</td>
                <td class="px-4 py-3">{{ keyword.priority_score }}</td>
                <td class="px-4 py-3 space-x-2">
                    <form action="/admin/generate/{{ keyword.id }}" method="post" class="inline">
                        <button class="text-blue-600 text-xs">Generate</button>
                    </form>
                    <form action="/admin/keywords/{{ keyword.id }}/queue" method="post" class="inline">
                        <button class="text-slate-500 text-xs">Queue</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
