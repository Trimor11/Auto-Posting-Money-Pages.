{% extends 'base.html' %}
{% block content %}
<section class="max-w-5xl mx-auto py-10 px-4">
    <h1 class="text-3xl font-semibold">Search</h1>
    <form action="/search" method="get" class="mt-4 flex bg-white rounded-lg shadow border border-slate-100 overflow-hidden">
        <input type="text" name="q" placeholder="Find templates..." value="{{ query }}" class="flex-1 px-4 py-3 focus:outline-none">
        <button class="px-5 bg-blue-600 text-white font-semibold">Search</button>
    </form>
    <p class="text-sm text-slate-500 mt-3">{{ results|length }} results</p>
    <div class="mt-6 space-y-5">
        {% for page in results %}
        <a href="/{{ page.slug }}" class="block bg-white border border-slate-100 rounded-xl p-5 hover:border-blue-200">
            <p class="text-lg font-semibold">{{ page.title }}</p>
            <p class="text-slate-600 text-sm mt-1">{{ page.meta_description }}</p>
        </a>
        {% else %}
        <p class="text-slate-500">No pages yet. Try another phrase.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
